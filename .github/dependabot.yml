version: 2
updates:
  - package-ecosystem: npm
    directory: /
    groups:
      eslint:
        patterns:
          - "*eslint*"
      types:
        patterns:
          - "@types/*"
    schedule:
      interval: monthly
      time: "08:30"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "08:30"
      timezone: Asia/Tokyo
    cooldown:
      default-days: 7

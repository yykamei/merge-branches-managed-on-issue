name: Merge Branches Managed on Issue
concurrency: merge_branches
on:
  workflow_dispatch:
    inputs:
      base-branch:
        description: base-branch
        required: true
      force:
        description: force
        required: false
        default: "false"
  delete:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created, edited]

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5
        with:
          fetch-depth: 0

      - uses: ./
        with:
          issue-number: 1152
